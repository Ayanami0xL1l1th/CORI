name: Sync OCD Clash Rule

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: rule-clash-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取你自己的仓库
      - name: Checkout repo
        uses: actions/checkout@v5

      # 2️⃣ Git 配置
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 3️⃣ clone 上游仓库
      - name: Clone upstream
        run: |
          git clone --depth=1 https://github.com/peiyingyao/Rule-for-OCD.git upstream

      # 4️⃣ 调试
      - name: Debug upstream structure
        run: |
          echo "===== upstream rule ====="
          ls -R upstream/rule || true

          echo "===== clash ====="
          ls -R upstream/rule/Clash || true

      # 5️⃣ 同步 Clash → rule
      - name: Sync Clash rules (safe)
        run: |
          mkdir -p rule
          rsync -av upstream/rule/Clash/ rule/

      # 6️⃣ 检查结果
      - name: Verify result
        run: |
          echo "===== rule structure ====="
          ls -R rule

      # 7️⃣ 提交 & 推送（带时间）
      - name: Commit & Push
        run: |
          git add rule

          git commit -m "sync Rule-for-OCD $(date '+%Y-%m-%d %H:%M:%S')" || echo "no changes"

          git push
