name: Sync Rule-for-OCD

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: rule-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 仓库
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2️⃣ 设置 Git
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 3️⃣ 克隆上游
      - name: Clone upstream
        run: |
          git clone --depth=1 https://github.com/peiyingyao/Rule-for-OCD upstream

      # 4️⃣ 同步规则（不会删除你的文件）
      - name: Sync rules
        run: |
          mkdir -p rule
          cp -r upstream/rule/* rule/

      # 5️⃣ 删除临时仓库
      - name: Clean
        run: rm -rf upstream

      # 6️⃣ 检测是否有变化
      - name: Check changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 7️⃣ 提交
      - name: Commit
        if: steps.check.outputs.changed == 'true'
        run: |
          git add rule
          git commit -m "Auto sync Rule-for-OCD rules"

      # 8️⃣ 推送
      - name: Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git push origin main
