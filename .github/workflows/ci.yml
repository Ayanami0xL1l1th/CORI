name: Sync OCD Clash rule

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: rule-clash-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
 
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 上游仓库
      - name: Clone upstream
        run: |
          git clone --depth=1 https://github.com/peiyingyao/Rule-for-OCD.git upstream

      - name: Debug upstream structure
        run: |
          echo "===== upstream rule ====="
          ls -R upstream/rule || true

          echo "===== clash ====="
          ls -R upstream/rule/Clash || true

      # 同步 Clash → rule
      - name: Sync Clash rules (safe)
        run: |
          mkdir -p rule
          rsync -av upstream/rule/Clash/ rule/

      - name: Verify result
        run: |
          echo "===== rule structure ====="
          ls -R rule

      - name: Commit & Push
        run: |
          git add rule

          git commit -m "Rule-for-OCD Clash rule https://github.com/peiyingyao/Rule-for-OCD $(date '+%Y-%m-%d %H:%M:%S')" || echo "no changes"

          git push
