name: Sync OCD Clash Rule

on:
  schedule:
    - cron: "0 7 * * *"   # 每天 UTC 07:00
  workflow_dispatch:

concurrency:
  group: rule-clash-sync
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取自己仓库
      - name: Checkout repo
        uses: actions/checkout@v5

      # 2️⃣ Git 配置
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 3️⃣ 获取 upstream 最新 Clash commit
      - name: Get upstream hash
        id: upstream
        run: |
          HASH=$(git ls-remote https://github.com/peiyingyao/Rule-for-OCD.git refs/heads/master | cut -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      # 4️⃣ 获取本地上次同步 hash
      - name: Get local hash
        id: local
        run: |
          if [ -f .last_sync_clash ]; then
            echo "hash=$(cat .last_sync_clash)" >> $GITHUB_OUTPUT
          else
            echo "hash=none" >> $GITHUB_OUTPUT
          fi

      # 5️⃣ 判断是否需要同步
      - name: Check if sync needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.hash }}" != "${{ steps.local.outputs.hash }}" ]; then
            echo "need_sync=true" >> $GITHUB_OUTPUT
          else
            echo "need_sync=false" >> $GITHUB_OUTPUT
          fi

      # 6️⃣ 克隆 upstream（仅在需要同步时）
      - name: Clone upstream
        if: steps.check.outputs.need_sync == 'true'
        run: git clone --depth=1 https://github.com/peiyingyao/Rule-for-OCD upstream

      # 7️⃣ 同步 Clash 文件夹（覆盖）
      - name: Sync Clash rules
        if: steps.check.outputs.need_sync == 'true'
        run: |
          mkdir -p rule
          mkdir -p rule/Clash
          cp -r upstream/rule/Clash/* rule/

      # 8️⃣ 清理
      - name: Clean
        if: steps.check.outputs.need_sync == 'true'
        run: rm -rf upstream

      # 9️⃣ 保存本次同步 hash
      - name: Save sync hash
        if: steps.check.outputs.need_sync == 'true'
        run: echo "${{ steps.upstream.outputs.hash }}" > .last_sync_clash

      # 🔟 提交 & 推送
      - name: Commit & Push
        if: steps.check.outputs.need_sync == 'true'
        run: |
          git add rule/Clash .last_sync_clash
          git commit -m "Sync OCD Clash rule (${{
            steps.upstream.outputs.hash
          }})"
          git push

      # ❌ 没更新提示
      - name: Skip
        if: steps.check.outputs.need_sync == 'false'
        run: echo "✅ Clash 已是最新，无需同步"
