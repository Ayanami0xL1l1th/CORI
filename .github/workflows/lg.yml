name: Sync Lige Icons

on:
  workflow_dispatch:

concurrency:
  group: lige-icon-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 上游仓库
      - name: Clone upstream
        run: |
          git clone --depth=1 https://github.com/lige47/lige_icon.git upstream

      - name: Debug upstream structure
        run: |
          echo "===== upstream icon ====="
          ls -R upstream/icon || true

      # 同步 icon → lige
      - name: Sync icon folder
        run: |
          mkdir -p lige
          rsync -av --delete upstream/icon/ lige/

      - name: Verify result
        run: |
          echo "===== lige structure ====="
          ls -R lige

      - name: Commit & Push
        run: |
          git add lige

          git commit -m "lige_icon https://github.com/lige47/lige_icon" || echo "no changes"

          git push
