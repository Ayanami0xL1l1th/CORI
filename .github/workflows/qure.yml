name: Sync Qure IconSet

on:
  workflow_dispatch:

concurrency:
  group: qure-icon-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 上游仓库
      - name: Clone upstream
        run: |
          git clone --depth=1 https://github.com/Koolson/Qure.git upstream

      - name: Debug upstream structure
        run: |
          echo "===== upstream IconSet ====="
          ls -R upstream/IconSet || true

      # 同步 IconSet → qure
      - name: Sync IconSet folder
        run: |
          mkdir -p qure
          rsync -av --delete upstream/IconSet/ qure/

      - name: Verify result
        run: |
          echo "===== qure structure ====="
          ls -R qure

      - name: Commit & Push
        run: |
          git add qure
          git commit -m "Qure https://github.com/Koolson/Qure" || echo "no changes"
          git push
